<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Original+Surfer&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/general_style.css" />
    <link rel="stylesheet" href="css/footer_nav.css" />
    <link rel="stylesheet" href="css/product_page.css" />
    <!-- planning to replace inner html of title into the name of the product -->
    <script src="js/footer_and_nav_functionality.js" defer></script>
  </head>
  <body>
    <nav></nav>
    <main>
      <article id="product_container">
        <section class="name_price_container">
          <h1 class="finger-paint-regular">Name</h1>
          <h3 class="roboto-slab-regular">price</h3>
        </section>
        <img src="/assets/beaver_single_bg.png" alt="" />
        <button class="check_aval"></button>
        <button class="book_button"></button>
      </article>
      <section id="description_container">
        <h1 class="finger-paint-regular">Description</h1>
        <section
          class="description_txt_container roboto-slab-regular dark_container"
        >
          <p>
            size: 10ft <br />
            activity: ["party", "sport"], <br />
            background: "fluff text", <br />
            ageRange: "8-12", releaseYear: "2008"
          </p>
        </section>
      </section>
      <h2 class="finger-paint-regular">Other performers in our catalogue:</h2>
      <section id="Other Animatronics">
        <p></p>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
