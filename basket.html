<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Original+Surfer&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/general_style.css" />
    <link rel="stylesheet" href="css/basket.css" />
    <script src="js/footer_and_nav_functionality.js" defer></script>
    <script src="js/data.js"></script>
    <script src="js/cart_work.js"></script>
  </head>
  <body>
    <nav></nav>
    <main class="basket_main">
      <article id="cart_container" class="roboto-slab-regular">
        <figure class="item dark_container">
          <img src="assets/download.png" alt="" />
          <h3>Name</h3>
          <p>000 SEK</p>
          <button class="leafy_button remove_button">
            <p class="roboto-slab-regular">Remove</p>
          </button>
        </figure>
        <figure class="item dark_container">
          <img src="assets/download.png" alt="" />
          <h3>Name</h3>
          <p>000 SEK</p>
          <button class="leafy_button remove_button">
            <p class="roboto-slab-regular">Remove</p>
          </button>
        </figure>
      </article>
      <section class="button_container roboto-slab-regular">
        <button class="clear_cart">
          <p class="roboto-slab-regular">Clear Cart</p>
        </button>
        <button class="accept_button">
          <p class="roboto-slab-regular">Accept</p>
        </button>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
